# Server Configuration
# CRITICAL: Render injects a PORT env var — app MUST bind to it or traffic won't reach the app
server.port=${PORT:8080}

# MongoDB Configuration
# Reads MONGODB_URI first (set in Render dashboard), falls back to SPRING_DATA_MONGODB_URI,
# then falls back to localhost for local development.
spring.data.mongodb.uri=${MONGODB_URI:${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/avvahomefoods?connectTimeoutMS=10000&serverSelectionTimeoutMS=30000&socketTimeoutMS=30000}}

# Application Name
spring.application.name=avva-home-foods

# Google OAuth Configuration
google.client.id=${GOOGLE_CLIENT_ID:your-local-google-client-id}

# Disable banner for cleaner logs
spring.main.banner-mode=off

# Actuator Configuration (for health checks in Render)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
server.servlet.context-path=/

# MongoDB — disable auto-index-creation to avoid extra MongoDB calls on startup
spring.data.mongodb.auto-index-creation=false

# Serve uploaded images from filesystem (written by ProductController at runtime)
# NOTE: This is kept for local static assets only. Product images are now served via Cloudinary CDN.
spring.web.resources.static-locations=classpath:/static/

# Cloudinary — persistent image hosting
# Set these as environment variables in Render dashboard (never hard-code secrets here)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your-cloud-name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your-api-key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your-api-secret}

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging for easier Render debugging
logging.level.org.springframework=INFO
logging.level.com.avvahomefoods=DEBUG
