# Server Configuration
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/avvahomefoods}
spring.data.mongodb.database=avvahomefoods

# Application Name
spring.application.name=avva-home-foods

# Google OAuth Configuration
google.client.id=${GOOGLE_CLIENT_ID:your-local-google-client-id}

# Disable banner for cleaner logs
spring.banner.location=classpath:/banner.txt

# Actuator Configuration (for health checks in Render)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
server.servlet.context-path=/
