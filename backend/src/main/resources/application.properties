# Server Configuration
# Render assigns PORT dynamically; fall back to 8080 for local dev
server.port=${PORT:8080}

# MongoDB Configuration
# Override SPRING_DATA_MONGODB_URI in Render env vars with your Atlas URI
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/avvahomefoods}
spring.data.mongodb.database=avvahomefoods

# Application Name
spring.application.name=avva-home-foods

# Google OAuth Configuration
google.client.id=${GOOGLE_CLIENT_ID}
