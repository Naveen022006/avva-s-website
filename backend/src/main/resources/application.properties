# Server Configuration
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/avvahomefoods}
spring.data.mongodb.database=avvahomefoods

# Application Name
spring.application.name=avva-home-foods

# Google OAuth Configuration
google.client.id=${GOOGLE_CLIENT_ID:your-local-google-client-id}

# Disable banner for cleaner logs
spring.main.banner-mode=off

# Actuator Configuration (for health checks in Render)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
server.servlet.context-path=/

# MongoDB connection timeout settings to fail fast instead of hanging
spring.data.mongodb.auto-index-creation=true
spring.mongodb.embedded.version=4.0.21

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging for easier Render debugging
logging.level.org.springframework=INFO
logging.level.com.avvahomefoods=DEBUG
